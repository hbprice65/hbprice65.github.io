<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-branding">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | default: page.title }}</a>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul class="site-nav__list">
            <li><a href="{{ '/#bio' | relative_url }}">Bio</a></li>
            <li><a href="{{ '/#research-projects' | relative_url }}">Research</a></li>
            <li><a href="{{ '/#publications' | relative_url }}">Publications</a></li>
            <li><a href="{{ '/#clinical-work' | relative_url }}">Clinical</a></li>
          </ul>
        </nav>
      </header>

      <main class="site-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        {% include footer.html %}
      </footer>
    </div>
  </body>
</html>
