<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-branding">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | default: page.title }}</a>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          <ul class="site-nav__list">
            <li><a href="{{ '/#engineering-projects' | relative_url }}">Engineering Projects</a></li>

            <li><a href="{{ '/#beyond' | relative_url }}">Beyond</a></li>
            <!--
            <li><a href="{{ '/#hardware' | relative_url }}">Hardware</a></li>
            <li><a href="{{ '/#software' | relative_url }}">Software</a></li>
            <li><a href="{{ '/#outreach' | relative_url }}">Outreach</a></li>
            -->
          </ul>
        </nav>
      </header>

      <main class="site-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        {% include footer.html %}
      </footer>
    </div>
  </body>
</html>
