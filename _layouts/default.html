<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-branding">
          <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | default: page.title }}</a>
          <p class="site-description">{{ site.description }}</p>
        </div>
      </header>

      <main class="site-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        {% include footer.html %}
      </footer>
    </div>
  </body>
</html>
