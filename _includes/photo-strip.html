{% assign collection = site.data.photo_collections[include.collection] %}
{% if collection %}
<div class="photo-strip" aria-label="{{ collection.title }}">
  {% for photo in collection.images %}
    <img src="{{ photo.src | relative_url }}" alt="{{ photo.alt }}" loading="lazy">
  {% endfor %}
</div>
{% else %}
<p><em>Photo collection '{{ include.collection }}' not found.</em></p>
{% endif %}
